<!DOCTYPE html>
<html data-theme="arwes" lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>matrix-view</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg:        #060d14;
    --surface:   #0b1520;
    --surface-2: #0e1c2b;
    --border:    rgba(0,200,230,.15);
    --border-2:  rgba(0,200,230,.3);

    --text:      #c8f0ff;
    --text-md:   #8ecfe8;
    --text-sm:   #5a93a8;
    --text-xs:   #3a6070;

    --primary:       #00c8e6;
    --primary-mid:   #0096b4;
    --primary-light: #00e5ff;
    --primary-pale:  rgba(0,200,230,.06);

    --done-dark:   #00e57a; --done:   #00cc6a; --done-bg:   rgba(0,204,106,.08); --done-border:   rgba(0,204,106,.3);
    --pending-dark:#5a93a8; --pending:#3a6070; --pending-bg:rgba(58,96,112,.08); --pending-border:rgba(58,96,112,.25);
    --review-dark: #ffd166; --review: #ffb700; --review-bg: rgba(255,183,0,.08);  --review-border: rgba(255,183,0,.35);
    --na-dark:     #2a4055; --na:     #1e3040; --na-bg:     rgba(14,28,43,.5);    --na-border:     rgba(30,48,64,.6);

    --accent-glow: 0 0 8px rgba(0,200,230,.4), 0 0 20px rgba(0,200,230,.15);
    --done-glow:   0 0 8px rgba(0,204,106,.4);
    --review-glow: 0 0 8px rgba(255,183,0,.4);

    --radius-sm: 4px;
    --radius:    6px;
    --radius-lg: 8px;
    --shadow-sm: 0 1px 4px rgba(0,0,0,.4);
    --shadow:    0 2px 8px rgba(0,0,0,.5);
    --shadow-md: 0 4px 16px rgba(0,0,0,.6);
    --font: 'Exo 2', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'Share Tech Mono', 'SF Mono', 'Cascadia Mono', 'Fira Code', monospace;
  }

  /* ── Light theme ────────────────────────────────────────────────────────── */
  [data-theme="light"] {
    --bg:        #f6f8fa;
    --surface:   #ffffff;
    --surface-2: #f0f2f5;
    --border:    rgba(0,0,0,.1);
    --border-2:  rgba(0,0,0,.18);

    --text:      #0d1117;
    --text-md:   #374151;
    --text-sm:   #6b7280;
    --text-xs:   #9ca3af;

    --primary:       #2563eb;
    --primary-mid:   #1d4ed8;
    --primary-light: #1e40af;
    --primary-pale:  rgba(37,99,235,.06);

    --done-dark:    #16a34a; --done:    #22c55e; --done-bg:    rgba(34,197,94,.08);  --done-border:    rgba(34,197,94,.3);
    --pending-dark: #4b5563; --pending: #9ca3af; --pending-bg: rgba(156,163,175,.1); --pending-border: rgba(156,163,175,.3);
    --review-dark:  #b45309; --review:  #f59e0b; --review-bg:  rgba(245,158,11,.08); --review-border:  rgba(245,158,11,.35);
    --na-dark:      #9ca3af; --na:      #d1d5db; --na-bg:      rgba(209,213,219,.2); --na-border:      rgba(209,213,219,.5);

    --accent-glow: 0 0 0 2px rgba(37,99,235,.15);
    --done-glow:   none;
    --review-glow: none;

    --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
    --shadow:    0 2px 8px rgba(0,0,0,.1);
    --shadow-md: 0 4px 16px rgba(0,0,0,.12);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    --mono: 'SF Mono', 'Cascadia Mono', 'Fira Code', 'Consolas', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh;
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.06) 2px,
      rgba(0,0,0,.06) 4px
    );
  }

  /* ── Header ────────────────────────────────────────────────────────────── */
  .header {
    background: linear-gradient(135deg, #030a10 0%, #061018 60%, #08141e 100%);
    padding: 28px 32px 0;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--primary);
    box-shadow: 0 0 30px rgba(0,200,230,.12), inset 0 -1px 0 rgba(0,200,230,.2);
  }
  /* Grid pattern */
  .header::before {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,200,230,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,230,.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Horizontal glow line at bottom */
  .header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--primary), rgba(0,229,255,.8), var(--primary), transparent);
    pointer-events: none;
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 14px; position: relative; }
  .header-title { display: flex; align-items: center; gap: 10px; }
  .header-icon {
    width: 36px; height: 36px; background: rgba(0,200,230,.15); border: 1px solid rgba(0,200,230,.4);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
    box-shadow: var(--accent-glow);
  }
  .header h1 {
    font-size: 1.25rem; font-weight: 700; color: var(--primary-light);
    letter-spacing: .08em; text-transform: uppercase;
    text-shadow: 0 0 12px rgba(0,229,255,.6), 0 0 30px rgba(0,200,230,.3);
  }
  .header-sub { font-size: .74rem; color: var(--text-sm); margin-top: 3px; letter-spacing: .04em; font-weight: 300; }
  .header-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .badge {
    font-size: .68rem; font-weight: 500; background: rgba(0,200,230,.08); color: var(--primary-light);
    padding: 3px 10px; border-radius: 2px; border: 1px solid rgba(0,200,230,.25); white-space: nowrap;
    letter-spacing: .06em; text-transform: uppercase;
  }
  .jira-chip {
    display: inline-flex; align-items: center; gap: 5px; font-size: .74rem; font-weight: 600;
    color: var(--primary-light); background: rgba(0,200,230,.1); border: 1px solid rgba(0,200,230,.35);
    padding: 5px 12px; border-radius: var(--radius-sm); text-decoration: none;
    transition: background .15s, box-shadow .15s; flex-shrink: 0; letter-spacing: .04em;
  }
  .jira-chip:hover { background: rgba(0,200,230,.18); box-shadow: var(--accent-glow); }

  /* ── Summary strip ──────────────────────────────────────────────────────── */
  .summary-strip {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 32px;
    background: rgba(0,200,230,.04);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .progress-block { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 200px; }
  .progress-bar { flex: 1; height: 4px; background: rgba(0,200,230,.12); border-radius: 0; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--done-dark); border-radius: 0; transition: width .4s cubic-bezier(.4,0,.2,1); box-shadow: 0 0 6px var(--done-dark); }
  .progress-text { font-size: .74rem; font-weight: 600; color: var(--primary-light); white-space: nowrap; letter-spacing: .04em; }
  .stat-pill {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 2px;
    font-size: .72rem; font-weight: 600; cursor: pointer; transition: transform .1s, box-shadow .15s; border: 1px solid;
    letter-spacing: .04em;
  }
  .stat-pill:hover { transform: translateY(-1px); }
  .stat-pill.done    { color: var(--done-dark);    background: var(--done-bg);    border-color: var(--done-border); }
  .stat-pill.pending { color: var(--pending-dark); background: var(--pending-bg); border-color: var(--pending-border); }
  .stat-pill.review  { color: var(--review-dark);  background: var(--review-bg);  border-color: var(--review-border); }
  .stat-pill.na      { color: var(--na-dark);      background: var(--na-bg);      border-color: var(--na-border); }

  /* ── Legend hint ────────────────────────────────────────────────────────── */
  .legend-hint {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 32px;
    background: rgba(0,200,230,.03);
    border-bottom: 1px solid var(--border);
    font-size: .72rem; color: var(--text-sm); letter-spacing: .03em;
  }
  .legend-hint svg { flex-shrink: 0; }

  /* ── Top tabs ───────────────────────────────────────────────────────────── */
  .top-tabs-nav {
    display: flex; gap: 0; padding: 0 32px;
    background: rgba(0,200,230,.04);
    border-bottom: 1px solid var(--primary);
    position: relative;
  }
  .top-tab-btn {
    padding: 11px 18px; font-size: .78rem; font-weight: 500; cursor: pointer;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-sm); white-space: nowrap; transition: color .15s, border-color .15s, text-shadow .15s;
    position: relative; letter-spacing: .06em; text-transform: uppercase;
  }
  .top-tab-btn:hover { color: var(--text); }
  .top-tab-btn.active {
    color: var(--primary-light); border-bottom-color: var(--primary-light);
    text-shadow: 0 0 10px rgba(0,229,255,.5);
  }

  /* ── Subtabs ────────────────────────────────────────────────────────────── */
  .subtabs-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; gap: 4px;
  }
  .subtab-btn {
    padding: 10px 14px; font-size: .78rem; font-weight: 500; cursor: pointer;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-sm); white-space: nowrap; transition: color .15s, border-color .15s;
    display: flex; align-items: center; gap: 7px; letter-spacing: .03em;
  }
  .subtab-btn:hover { color: var(--text); }
  .subtab-btn.active { color: var(--primary-light); border-bottom-color: var(--primary-light); font-weight: 600; }
  .subtab-dots { display: flex; gap: 3px; align-items: center; }
  .sdot { width: 5px; height: 5px; border-radius: 50%; }
  .sdot.done    { background: var(--done); box-shadow: 0 0 4px var(--done); }
  .sdot.pending { background: var(--pending); }
  .sdot.review  { background: var(--review); box-shadow: 0 0 4px var(--review); }

  /* ── Content ────────────────────────────────────────────────────────────── */
  .content { padding: 24px 32px; }
  .top-panel { display: none; }
  .top-panel.active { display: block; }
  .sub-panel { display: none; }
  .sub-panel.active { display: block; }

  /* ── Subtab description ─────────────────────────────────────────────────── */
  .sub-description {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 5px 12px;
    font-size: .72rem; color: var(--text-sm); font-family: var(--mono);
    margin-bottom: 16px; letter-spacing: .03em;
  }

  /* ── Toolbar ────────────────────────────────────────────────────────────── */
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
                 color: var(--text-xs); pointer-events: none; }
  .search-box {
    padding: 7px 12px 7px 32px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: .8rem; width: 220px; outline: none; background: var(--surface-2);
    color: var(--text); transition: border-color .15s, box-shadow .15s; font-family: var(--font);
  }
  .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0,200,230,.15); }
  .filter-set { display: flex; gap: 4px; flex-wrap: wrap; }
  .fpill {
    padding: 4px 11px; font-size: .72rem; font-weight: 500; border-radius: 2px; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-sm);
    transition: all .15s; white-space: nowrap; letter-spacing: .04em;
  }
  .fpill:hover { border-color: var(--border-2); color: var(--text); }
  .fpill.active { background: rgba(0,200,230,.12); color: var(--primary-light); border-color: var(--primary); }

  /* ── Section ────────────────────────────────────────────────────────────── */
  .section { margin-bottom: 24px; }
  .section-label {
    font-size: .66rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: var(--primary); margin-bottom: 8px; padding-left: 2px;
    display: flex; align-items: center; gap: 8px;
    text-shadow: 0 0 8px rgba(0,200,230,.3);
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }
  /* Corner frame decoration on section-card */
  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 0; overflow: visible;
    position: relative;
    box-shadow: 0 0 0 1px rgba(0,200,230,.04), inset 0 0 30px rgba(0,200,230,.02);
  }
  /* Arwes-style corner clips */
  .section-card::before, .section-card::after {
    content: ''; position: absolute; width: 8px; height: 8px; pointer-events: none;
    border-color: var(--primary); border-style: solid;
    z-index: 1;
  }
  .section-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .section-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* ── Todo rows ──────────────────────────────────────────────────────────── */
  .todo-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 14px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    position: relative;
  }
  .todo-row:last-child { border-bottom: none; }
  [data-row-wrap]:last-child .todo-row { border-bottom: none; }
  .todo-row::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; border-radius: 0;
    background: transparent; transition: background .15s;
  }
  .todo-row:hover { background: rgba(0,200,230,.04); }
  .todo-row:hover::before { background: var(--border-2); }
  .todo-row.done   { background: var(--done-bg); }
  .todo-row.done::before { background: var(--done); box-shadow: var(--done-glow); }
  .todo-row.review { background: var(--review-bg); }
  .todo-row.review::before { background: var(--review); box-shadow: var(--review-glow); }
  .todo-row.na     { background: var(--na-bg); opacity: .5; }
  .todo-row.na::before { background: var(--na-border); }
  /* Pulse animation on status change */
  @keyframes statusPulse {
    0%   { opacity: 1; }
    30%  { opacity: .4; }
    100% { opacity: 1; }
  }
  .todo-row.status-changed { animation: statusPulse .3s ease-out; }

  /* Toggle checkbox */
  .toggle {
    flex-shrink: 0; width: 18px; height: 18px; border-radius: 2px;
    border: 1px solid; display: flex; align-items: center; justify-content: center;
    font-size: .65rem; font-weight: 700; margin-top: 2px;
    transition: all .15s; user-select: none;
  }
  .toggle.done    { background: rgba(0,204,106,.15); border-color: var(--done); color: var(--done); box-shadow: 0 0 6px rgba(0,204,106,.3); }
  .toggle.pending { background: transparent; border-color: var(--border-2); color: transparent; }
  .toggle.review  { background: rgba(255,183,0,.1); border-color: var(--review); color: var(--review); font-size: .8rem; }
  .toggle.na      { background: var(--na-bg); border-color: var(--na-border); color: var(--na); font-size: .85rem; }

  /* Row body */
  .row-body { flex: 1; min-width: 0; }
  .row-label {
    font-size: .84rem; font-weight: 500; color: var(--text-md); line-height: 1.4;
    transition: color .15s;
  }
  .todo-row.done .row-label { color: var(--text-sm); }
  .todo-row.na   .row-label { text-decoration: line-through; color: var(--text-xs); }
  .row-tech {
    font-size: .70rem; color: var(--text-xs); font-family: var(--mono);
    margin-top: 2px; line-height: 1.4;
  }
  .row-note {
    display: inline-flex; align-items: flex-start; gap: 4px;
    font-size: .72rem; color: var(--review-dark); margin-top: 4px; line-height: 1.4;
  }
  .row-note.info { color: var(--primary-light); }

  /* Status badge (right) */
  .status-badge {
    flex-shrink: 0; padding: 2px 9px; border-radius: 2px; font-size: .68rem;
    font-weight: 600; border: 1px solid; white-space: nowrap; margin-top: 2px;
    cursor: pointer; transition: all .15s; letter-spacing: .06em; text-transform: uppercase;
  }
  .status-badge.done    { color: var(--done-dark);    background: var(--done-bg);    border-color: var(--done-border); }
  .status-badge.pending { color: var(--pending-dark); background: var(--pending-bg); border-color: var(--pending-border); }
  .status-badge.review  { color: var(--review-dark);  background: var(--review-bg);  border-color: var(--review-border); }
  .status-badge.na      { color: var(--na-dark);      background: var(--na-bg);      border-color: var(--na-border); }

  /* Setup code block */
  .setup-code-wrap {
    margin: 0 14px 10px calc(18px + 12px + 14px);
    border: 1px solid rgba(0,200,230,.25);
    border-radius: 0;
    overflow: hidden;
  }
  .setup-code-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px;
    background: rgba(0,200,230,.12);
    border-bottom: 1px solid rgba(0,200,230,.2);
    font-size: .65rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--primary-light);
  }
  .setup-code-header span { display: flex; align-items: center; gap: 5px; }
  .copy-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 2px; font-size: .65rem; font-weight: 500;
    background: rgba(0,200,230,.12); color: var(--primary-light);
    border: 1px solid rgba(0,200,230,.3); cursor: pointer;
    transition: background .15s, box-shadow .15s; font-family: var(--font);
  }
  .copy-btn:hover { background: rgba(0,200,230,.22); box-shadow: 0 0 8px rgba(0,200,230,.2); }
  .copy-btn.copied { background: rgba(0,204,106,.15); color: var(--done-dark); border-color: var(--done-border); }
  .setup-code-body {
    background: #030d12;
    padding: 12px 14px;
    overflow-x: auto;
    border-top: 1px solid rgba(0,200,230,.1);
  }
  .setup-code-body pre {
    margin: 0; font-family: var(--mono); font-size: .78rem;
    color: #7fe5f5; line-height: 1.65; white-space: pre;
  }

  /* How-to-test button */
  .how-test-btn {
    flex-shrink: 0; margin-top: 1px;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 2px;
    font-size: .70rem; font-weight: 500;
    color: var(--primary-light); background: rgba(0,200,230,.06);
    border: 1px solid rgba(0,200,230,.25);
    cursor: pointer; white-space: nowrap;
    transition: background .15s, box-shadow .15s;
    user-select: none; letter-spacing: .04em;
  }
  .how-test-btn:hover { background: rgba(0,200,230,.12); box-shadow: 0 0 8px rgba(0,200,230,.2); }
  .how-test-btn.open  { background: rgba(0,200,230,.18); border-color: var(--primary); box-shadow: var(--accent-glow); }

  /* How-to-test panel */
  .how-test-panel {
    display: none;
    margin: 0 14px 10px calc(18px + 12px + 14px); /* align with row-body */
    padding: 12px 14px;
    background: rgba(0,200,230,.04);
    border: 1px solid rgba(0,200,230,.2);
    border-radius: 0;
    font-size: .82rem; color: var(--text-md);
    line-height: 1.6;
  }
  .how-test-panel.open { display: block; }
  .how-test-panel-title {
    font-size: .65rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    color: var(--primary-light); margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
    text-shadow: 0 0 8px rgba(0,200,230,.3);
  }

  /* Suggestion button */
  .suggest-btn {
    flex-shrink: 0; margin-top: 1px;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 2px;
    font-size: .70rem; font-weight: 500;
    color: var(--review-dark); background: rgba(255,183,0,.06);
    border: 1px solid rgba(255,183,0,.25);
    cursor: pointer; white-space: nowrap;
    transition: background .15s, box-shadow .15s;
    user-select: none; letter-spacing: .04em;
  }
  .suggest-btn:hover { background: rgba(255,183,0,.12); box-shadow: 0 0 8px rgba(255,183,0,.2); }
  .suggest-btn.open  { background: rgba(255,183,0,.18); border-color: var(--review); box-shadow: var(--review-glow); }

  /* Suggestion panel */
  .suggest-panel {
    display: none;
    margin: 0 14px 10px calc(18px + 12px + 14px);
    border: 1px solid rgba(255,183,0,.3);
    border-radius: 0;
    overflow: hidden;
  }
  .suggest-panel.open { display: block; }
  .suggest-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px;
    background: rgba(255,183,0,.1);
    border-bottom: 1px solid rgba(255,183,0,.2);
    font-size: .65rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    color: var(--review-dark);
  }
  .suggest-panel-header span { display: flex; align-items: center; gap: 5px; }
  .suggest-file-ref {
    font-family: var(--mono); font-size: .74rem; padding: 6px 12px;
    background: #030d12; color: var(--review-dark);
    border-bottom: 1px solid rgba(255,183,0,.15);
  }
  .diff-block {
    background: #030d12; padding: 10px 14px; overflow-x: auto;
  }
  .diff-block pre { margin: 0; font-family: var(--mono); font-size: .78rem; line-height: 1.65; }
  .diff-line-del { color: #f87171; background: rgba(239,68,68,.08); display: block; padding: 0 4px; }
  .diff-line-add { color: #4ade80; background: rgba(74,222,128,.08); display: block; padding: 0 4px; }
  .diff-line-ctx { color: var(--text-xs); display: block; padding: 0 4px; }
  .suggest-description {
    font-size: .80rem; color: var(--text-md); background: rgba(255,183,0,.04);
    padding: 8px 12px; border-bottom: 1px solid rgba(255,183,0,.15); line-height: 1.5;
  }
  .suggest-actions {
    display: flex; gap: 8px; padding: 8px 12px;
    background: #030d12; border-top: 1px solid rgba(255,183,0,.15);
    flex-wrap: wrap; align-items: center;
  }
  .gh-copy-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 11px; border-radius: 2px; font-size: .70rem; font-weight: 600;
    background: rgba(31,111,235,.15); color: #7ab8ff; border: 1px solid rgba(56,139,253,.4);
    cursor: pointer; transition: background .15s, box-shadow .15s; font-family: var(--font);
    letter-spacing: .04em;
  }
  .gh-copy-btn:hover { background: rgba(31,111,235,.3); box-shadow: 0 0 8px rgba(56,139,253,.3); }
  .gh-copy-btn.copied { background: rgba(0,204,106,.15); color: var(--done-dark); border-color: var(--done-border); }
  .suggest-hint {
    font-size: .66rem; color: var(--text-xs); font-style: italic;
  }

  /* ── Empty state ────────────────────────────────────────────────────────── */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text-xs);
    font-size: .83rem; letter-spacing: .05em;
  }
  .empty-state svg { display: block; margin: 0 auto 10px; opacity: .2; }

  .hidden { display: none !important; }

  /* ── Scrollbar ──────────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,200,230,.2); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,200,230,.4); }

  /* ── Arwes Animations ───────────────────────────────────────────────────── */

  /* Item entrance: slide from left + fade */
  @keyframes itemEnter {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  [data-row-wrap] .todo-row {
    animation: itemEnter .22s ease-out both;
    animation-delay: calc(var(--ri, 0) * 28ms);
  }
  /* Re-trigger on tab switch */
  [data-row-wrap].re-enter .todo-row {
    animation: itemEnter .22s ease-out both;
    animation-delay: calc(var(--ri, 0) * 22ms);
  }

  /* Row hover: slide right + cyan left bar glow */
  .todo-row {
    transition: background .1s, transform .12s, box-shadow .12s;
  }
  .todo-row:hover {
    transform: translateX(3px);
    box-shadow: inset 3px 0 0 var(--primary), 0 0 12px rgba(0,200,230,.06);
  }
  .todo-row.done:hover   { box-shadow: inset 3px 0 0 var(--done),   0 0 12px rgba(0,204,106,.06); }
  .todo-row.review:hover { box-shadow: inset 3px 0 0 var(--review), 0 0 12px rgba(255,183,0,.06); }

  /* Section label entrance */
  @keyframes sectionLabelIn {
    from { opacity: 0; letter-spacing: .25em; }
    to   { opacity: 1; letter-spacing: .1em; }
  }
  .section-label { animation: sectionLabelIn .4s ease-out both; }

  /* Panel slide in */
  @keyframes panelSlideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .how-test-panel.open { animation: panelSlideIn .18s ease-out; }
  .suggest-panel.open  { animation: panelSlideIn .18s ease-out; }

  /* Top-panel/subtab panel fade */
  @keyframes panelFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .sub-panel.active  { animation: panelFadeIn .25s ease-out; }
  .top-panel.active  { animation: panelFadeIn .2s ease-out; }

  /* Glow pulse on status change */
  @keyframes statusGlow {
    0%   { box-shadow: inset 3px 0 0 transparent; }
    40%  { box-shadow: inset 3px 0 0 var(--primary), 0 0 20px rgba(0,200,230,.2); }
    100% { box-shadow: inset 3px 0 0 transparent; }
  }
  .todo-row.status-changed { animation: statusGlow .4s ease-out, statusPulse .3s ease-out; }

  /* Button hover glow */
  .top-tab-btn, .subtab-btn, .how-test-btn, .suggest-btn, .fpill, .copy-btn, .gh-copy-btn {
    transition: all .15s;
  }
  .top-tab-btn:hover  { text-shadow: 0 0 8px rgba(0,200,230,.4); }
  .subtab-btn:hover   { text-shadow: 0 0 6px rgba(0,200,230,.3); }

  /* Toggle hover glow */
  .toggle { transition: all .15s, box-shadow .15s; }
  .toggle:hover { box-shadow: 0 0 8px rgba(0,200,230,.4); }

  /* Typewriter cursor for header title */
  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
  .typewriter-cursor {
    display: inline-block; width: 2px; height: 1em;
    background: var(--primary-light); margin-left: 3px; vertical-align: text-bottom;
    animation: cursorBlink .7s step-end infinite;
    box-shadow: 0 0 6px var(--primary-light);
  }

  /* ── Theme switcher button ──────────────────────────────────────────────── */
  .theme-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: var(--radius-sm);
    font-size: .72rem; font-weight: 600; letter-spacing: .04em;
    background: rgba(0,200,230,.08); color: var(--primary-light);
    border: 1px solid rgba(0,200,230,.3); cursor: pointer;
    transition: all .15s; white-space: nowrap; font-family: var(--font);
    flex-shrink: 0;
  }
  .theme-btn:hover { background: rgba(0,200,230,.18); box-shadow: var(--accent-glow); }
  [data-theme="light"] .theme-btn {
    background: #f0f2f5; color: #374151; border-color: #d1d5db; box-shadow: none;
  }
  [data-theme="light"] .theme-btn:hover { background: #e5e7eb; box-shadow: none; }

  /* ── Light theme structural overrides ───────────────────────────────────── */

  /* No scanlines */
  [data-theme="light"] body::before { display: none; }

  /* Header */
  [data-theme="light"] .header {
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  [data-theme="light"] .header::before,
  [data-theme="light"] .header::after { display: none; }
  [data-theme="light"] .header h1 { color: #1e3a8a; text-shadow: none; }
  [data-theme="light"] .header-icon { background: #eff6ff; border-color: #bfdbfe; box-shadow: none; }
  [data-theme="light"] .badge { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
  [data-theme="light"] .jira-chip { color: #1d4ed8; background: #eff6ff; border-color: #93c5fd; }
  [data-theme="light"] .jira-chip:hover { background: #dbeafe; box-shadow: none; }

  /* Summary */
  [data-theme="light"] .summary-strip { background: #ffffff; border-bottom-color: #e5e7eb; }
  [data-theme="light"] .progress-bar { background: #e5e7eb; }
  [data-theme="light"] .progress-fill { box-shadow: none; }
  [data-theme="light"] .progress-text { color: #1d4ed8; }
  [data-theme="light"] .stat-pill:hover { box-shadow: none; }

  /* Legend */
  [data-theme="light"] .legend-hint { background: #f9fafb; border-bottom-color: #e5e7eb; color: #6b7280; }

  /* Top tabs */
  [data-theme="light"] .top-tabs-nav { background: #ffffff; border-bottom: 2px solid #e5e7eb; }
  [data-theme="light"] .top-tab-btn { color: #6b7280; }
  [data-theme="light"] .top-tab-btn:hover { color: #111827; text-shadow: none; }
  [data-theme="light"] .top-tab-btn.active { color: #1d4ed8; border-bottom-color: #2563eb; text-shadow: none; }

  /* Subtabs */
  [data-theme="light"] .subtabs-wrap { background: #f9fafb; border-bottom-color: #e5e7eb; }
  [data-theme="light"] .subtab-btn { color: #6b7280; }
  [data-theme="light"] .subtab-btn:hover { color: #111827; text-shadow: none; }
  [data-theme="light"] .subtab-btn.active { color: #1d4ed8; border-bottom-color: #2563eb; }
  [data-theme="light"] .sdot.done { box-shadow: none; }
  [data-theme="light"] .sdot.review { box-shadow: none; }

  /* Section card — no corner clips, normal radius */
  [data-theme="light"] .section-card {
    border-radius: var(--radius); box-shadow: var(--shadow-sm);
    background: #ffffff; border-color: #e5e7eb;
  }
  [data-theme="light"] .section-card::before,
  [data-theme="light"] .section-card::after { display: none; }
  [data-theme="light"] .section-label { color: #2563eb; text-shadow: none; animation: none; }
  [data-theme="light"] .section-label::after { background: linear-gradient(90deg, #e5e7eb, transparent); }

  /* Rows */
  [data-theme="light"] .todo-row:hover {
    background: #f0f7ff; transform: none;
    box-shadow: inset 3px 0 0 #2563eb;
  }
  [data-theme="light"] .todo-row.done:hover   { box-shadow: inset 3px 0 0 var(--done); }
  [data-theme="light"] .todo-row.review:hover { box-shadow: inset 3px 0 0 var(--review); }
  [data-theme="light"] .toggle:hover { box-shadow: 0 0 0 2px rgba(37,99,235,.2); }
  [data-theme="light"] .toggle.done { box-shadow: none; }

  /* Sub-description */
  [data-theme="light"] .sub-description { background: #f0f2f5; border-color: #e5e7eb; color: #374151; }

  /* Toolbar */
  [data-theme="light"] .search-box { background: #ffffff; color: #0d1117; border-color: #d1d5db; }
  [data-theme="light"] .search-box:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  [data-theme="light"] .fpill { background: #ffffff; border-color: #d1d5db; color: #6b7280; }
  [data-theme="light"] .fpill:hover { border-color: #93c5fd; color: #374151; }
  [data-theme="light"] .fpill.active { background: #eff6ff; color: #1d4ed8; border-color: #2563eb; }

  /* How-to-test */
  [data-theme="light"] .how-test-btn { color: #1d4ed8; background: #eff6ff; border-color: #bfdbfe; }
  [data-theme="light"] .how-test-btn:hover { background: #dbeafe; box-shadow: none; }
  [data-theme="light"] .how-test-btn.open { background: #dbeafe; border-color: #2563eb; box-shadow: none; }
  [data-theme="light"] .how-test-panel { background: #f9fafb; border-color: #e5e7eb; color: #374151; }
  [data-theme="light"] .how-test-panel-title { color: #1d4ed8; text-shadow: none; }

  /* Setup code */
  [data-theme="light"] .setup-code-wrap { border-color: #e5e7eb; }
  [data-theme="light"] .setup-code-header { background: #f0f2f5; border-bottom-color: #e5e7eb; color: #374151; }
  [data-theme="light"] .copy-btn { background: #ffffff; color: #1d4ed8; border-color: #bfdbfe; }
  [data-theme="light"] .copy-btn:hover { background: #eff6ff; box-shadow: none; }
  [data-theme="light"] .copy-btn.copied { background: #f0fdf4; color: #16a34a; border-color: rgba(34,197,94,.3); }
  [data-theme="light"] .setup-code-body { background: #f6f8fa; border-top-color: #e5e7eb; }
  [data-theme="light"] .setup-code-body pre { color: #1e3a5f; }

  /* Suggestion */
  [data-theme="light"] .suggest-btn { color: #b45309; background: #fffbeb; border-color: #fde68a; }
  [data-theme="light"] .suggest-btn:hover { background: #fef3c7; box-shadow: none; }
  [data-theme="light"] .suggest-btn.open { background: #fef3c7; border-color: #f59e0b; box-shadow: none; }
  [data-theme="light"] .suggest-panel { border-color: #fde68a; border-radius: var(--radius-sm); }
  [data-theme="light"] .suggest-panel-header { background: #fffbeb; border-bottom-color: #fde68a; color: #b45309; }
  [data-theme="light"] .suggest-file-ref { background: #f6f8fa; color: #b45309; border-bottom-color: #fde68a; }
  [data-theme="light"] .diff-block { background: #f6f8fa; }
  [data-theme="light"] .diff-block pre { color: #374151; }
  [data-theme="light"] .suggest-description { background: #fffbeb; color: #374151; border-bottom-color: #fde68a; }
  [data-theme="light"] .suggest-actions { background: #f6f8fa; border-top-color: #fde68a; }
  [data-theme="light"] .gh-copy-btn { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }
  [data-theme="light"] .gh-copy-btn:hover { background: #dbeafe; box-shadow: none; }
  [data-theme="light"] .gh-copy-btn.copied { background: #f0fdf4; color: #16a34a; border-color: rgba(34,197,94,.3); }
  [data-theme="light"] .suggest-hint { color: #9ca3af; }

  /* Scrollbar */
  [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 2px; }
  [data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.25); }

  /* Typewriter cursor */
  [data-theme="light"] .typewriter-cursor { background: #2563eb; box-shadow: none; }

  /* Disable entrance animations in light mode */
  [data-theme="light"] [data-row-wrap] .todo-row,
  [data-theme="light"] [data-row-wrap].re-enter .todo-row { animation: none; }
  [data-theme="light"] .todo-row { transition: background .15s; }
  [data-theme="light"] .todo-row.status-changed { animation: statusPulse .3s ease-out; }
  [data-theme="light"] .how-test-panel.open,
  [data-theme="light"] .suggest-panel.open { animation: panelSlideIn .18s ease-out; }
  [data-theme="light"] .sub-panel.active,
  [data-theme="light"] .top-panel.active { animation: panelFadeIn .2s ease-out; }

  /* ── Responsive ─────────────────────────────────────────────────────────── */
  @media (max-width: 700px) {
    .header, .summary-strip, .legend-hint, .top-tabs-nav, .subtabs-wrap, .content { padding-left: 16px; padding-right: 16px; }
    .search-box { width: 100%; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .search-wrap { width: 100%; }
    .search-box { width: 100%; }
  }
</style>

<body>
<script>
/*__MATRIX_DATA__*/

const STATUS_CYCLE  = ['pending', 'done', 'review', 'na'];
const STATUS_ICON   = { done: '✓', pending: '', review: '!', na: '—' };
const STATUS_LABEL  = { done: 'Listo', pending: 'Pendiente', review: 'Revisar', na: 'N/A' };

// ── Web Audio (Arwes-style sound effects) ─────────────────────────────────
let _actx = null;
function getAudioCtx() {
  if (!_actx) {
    try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
  return _actx;
}
function beep(freq = 880, dur = 0.06, vol = 0.07, type = 'sine', delay = 0) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  gain.gain.setValueAtTime(0, ctx.currentTime + delay);
  gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + dur + 0.01);
}
function soundToggle(next) {
  if (next === 'done')    { beep(660, .05, .08); beep(880, .05, .08, 'sine', .06); }
  else if (next === 'review') { beep(440, .08, .07, 'triangle'); }
  else if (next === 'na')     { beep(220, .1, .05, 'sawtooth'); }
  else                        { beep(330, .04, .04); }
}
function soundPanel() { beep(1200, .03, .05, 'sine'); beep(1600, .04, .04, 'sine', .04); }
function soundCopy()  { beep(880, .04, .06); beep(1100, .04, .06, 'sine', .05); }

// ── Theme ──────────────────────────────────────────────────────────────────────
const THEME_KEY   = 'mx::theme';
const THEMES      = ['arwes', 'light'];
const THEME_META  = {
  arwes: { icon: '🌌', label: 'Arwes' },
  light: { icon: '☀️',  label: 'Claro' },
};

function currentTheme() { return localStorage.getItem(THEME_KEY) || 'arwes'; }
function isArwes()      { return currentTheme() === 'arwes'; }

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(THEME_KEY, theme);
  const btn = document.getElementById('theme-btn');
  if (btn) {
    const m = THEME_META[theme];
    btn.textContent = `${m.icon} ${m.label}`;
    btn.title = `Cambiar a ${THEME_META[THEMES[(THEMES.indexOf(theme)+1)%THEMES.length]].label}`;
  }
}

function toggleTheme() {
  const next = THEMES[(THEMES.indexOf(currentTheme()) + 1) % THEMES.length];
  applyTheme(next);
}

// ── Persistence ───────────────────────────────────────────────────────────────
const STORE_KEY = `mx::${MATRIX_DATA.title}`;
function loadState()        { try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch { return {}; } }
function saveState(s)       { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
function getStatus(id, def) { return loadState()[id] || def || 'pending'; }
function setStatus(id, s)   { const st = loadState(); st[id] = s; saveState(st); }

// ── Counters ──────────────────────────────────────────────────────────────────
function countSections(sections) {
  const c = { done: 0, pending: 0, review: 0, na: 0 };
  (sections || []).forEach(sec => (sec.items || []).forEach(i => {
    const s = getStatus(i.id, i.status); c[s] = (c[s]||0) + 1;
  }));
  return c;
}
function countAll() {
  const c = { done: 0, pending: 0, review: 0, na: 0 };
  (MATRIX_DATA.tabs||[]).forEach(t => (t.subtabs||[]).forEach(s => {
    const sub = countSections(s.sections);
    Object.keys(c).forEach(k => c[k] += sub[k]);
  }));
  return c;
}
function total(c) { return Object.values(c).reduce((a,b)=>a+b,0); }

// ── DOM Helpers ───────────────────────────────────────────────────────────────
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls)  e.className = cls;
  if (html) e.innerHTML = html;
  return e;
}
function svg(path, size=14) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 16 16" fill="currentColor">${path}</svg>`;
}
const ICON_INFO   = svg(`<path fill-rule="evenodd" d="M8 1a7 7 0 100 14A7 7 0 008 1zM7 5a1 1 0 112 0v4a1 1 0 11-2 0V5zm1 7a1.25 1.25 0 100-2.5A1.25 1.25 0 009 12z"/>`);
const ICON_SEARCH = svg(`<path fill-rule="evenodd" d="M6.5 1a5.5 5.5 0 104.227 9.02l3.126 3.127a.75.75 0 001.06-1.06l-3.126-3.127A5.5 5.5 0 006.5 1zM2.5 6.5a4 4 0 118 0 4 4 0 01-8 0z"/>`);
const ICON_JIRA   = svg(`<path d="M8 .5C3.858.5.5 3.858.5 8S3.858 15.5 8 15.5 15.5 12.142 15.5 8 12.142.5 8 .5zM4.5 8l3.5 3.5L11.5 8 8 4.5 4.5 8z"/>`, 13);

// ── Build Header ──────────────────────────────────────────────────────────────
function buildHeader() {
  const m = MATRIX_DATA;
  const wrap = el('div', 'header');

  const badges = [
    m.context    && `<span class="badge">📋 ${m.context}</span>`,
    m.source_url && `<span class="badge">🔗 ${m.source_url}</span>`,
    m.generated_at && `<span class="badge">🕐 ${new Date(m.generated_at).toLocaleString('es',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</span>`,
  ].filter(Boolean).join('');

  const jira = m.jira_ticket
    ? `<a class="jira-chip" href="https://buk.atlassian.net/browse/${m.jira_ticket}" target="_blank">${ICON_JIRA} ${m.jira_ticket}</a>`
    : '';

  wrap.innerHTML = `
    <div class="header-top">
      <div class="header-title">
        <div class="header-icon">🗂️</div>
        <div>
          <h1><span class="header-title-text"></span><span class="typewriter-cursor"></span></h1>
          <div class="header-sub">Suite de verificación de retrocompatibilidad</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <button class="theme-btn" id="theme-btn" title="Cambiar tema"></button>
        ${jira}
      </div>
    </div>
    <div class="header-badges">${badges}</div>`;
  return wrap;
}

// ── Summary strip ─────────────────────────────────────────────────────────────
function buildSummary() {
  const wrap = el('div', 'summary-strip');
  wrap.id = 'summary-strip';
  updateSummary(wrap);
  return wrap;
}
function updateSummary(wrap) {
  const c = countAll(), t = total(c), pct = t ? Math.round(c.done/t*100) : 0;
  const pills = Object.entries(c).filter(([,v])=>v>0).map(([s,n])=>
    `<button class="stat-pill ${s}" data-qs="${s}">${STATUS_LABEL[s]} ${n}</button>`
  ).join('');
  wrap.innerHTML = `
    <div class="progress-block">
      <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:${pct}%"></div></div>
      <span class="progress-text">${c.done}/${t} <span style="opacity:.7;font-weight:400">verificados</span> · ${pct}%</span>
    </div>
    ${pills}`;
}

// ── Legend hint ───────────────────────────────────────────────────────────────
function buildLegend() {
  const wrap = el('div','legend-hint');
  wrap.innerHTML = `${ICON_INFO} <strong>Click</strong> en cualquier ítem para cambiar su estado &nbsp;·&nbsp; Ciclo: Pendiente → Listo → Revisar → N/A &nbsp;·&nbsp; Estado guardado en el browser`;
  return wrap;
}

// ── Top tabs nav ──────────────────────────────────────────────────────────────
function buildTopNav(tabs) {
  const nav = el('div','top-tabs-nav');
  tabs.forEach((t,i) => {
    const btn = el('button','top-tab-btn'+(i===0?' active':''), t.name);
    btn.dataset.ti = i;
    nav.appendChild(btn);
  });
  return nav;
}

// ── Subtabs nav ───────────────────────────────────────────────────────────────
function buildSubNav(subtabs, ti) {
  const wrap = el('div','subtabs-wrap');
  wrap.dataset.ti = ti;
  subtabs.forEach((sub, si) => {
    const c = countSections(sub.sections);
    const dots = ['done','pending','review'].filter(s=>c[s]>0)
      .map(s=>`<span class="sdot ${s}" title="${c[s]} ${STATUS_LABEL[s]}"></span>`).join('');
    const btn = el('button','subtab-btn'+(si===0?' active':''));
    btn.dataset.ti = ti; btn.dataset.si = si;
    btn.innerHTML = `${sub.name}<span class="subtab-dots">${dots}</span>`;
    wrap.appendChild(btn);
  });
  return wrap;
}
function refreshSubDots() {
  document.querySelectorAll('.subtab-btn').forEach(btn => {
    const sub = MATRIX_DATA.tabs?.[btn.dataset.ti]?.subtabs?.[btn.dataset.si];
    if (!sub) return;
    const c = countSections(sub.sections);
    const dots = ['done','pending','review'].filter(s=>c[s]>0)
      .map(s=>`<span class="sdot ${s}"></span>`).join('');
    btn.querySelector('.subtab-dots').innerHTML = dots;
  });
}

// ── Sub panel ─────────────────────────────────────────────────────────────────
function buildSubPanel(sub, si, ti, active) {
  const panel = el('div','sub-panel'+(active?' active':''));
  panel.dataset.ti = ti; panel.dataset.si = si;
  const pid = `${ti}-${si}`;

  // Description
  if (sub.description) {
    const d = el('div','sub-description');
    d.innerHTML = `<span style="color:var(--text-xs)">→</span> ${sub.description}`;
    panel.appendChild(d);
  }

  // Toolbar
  const tb = el('div','toolbar');
  tb.innerHTML = `
    <div class="search-wrap">
      <span class="search-icon">${ICON_SEARCH}</span>
      <input class="search-box" type="text" placeholder="Buscar ítem..." data-pid="${pid}">
    </div>
    <div class="filter-set">
      <button class="fpill active" data-f="all"    data-pid="${pid}">Todos</button>
      <button class="fpill"        data-f="pending" data-pid="${pid}">⬜ Pendiente</button>
      <button class="fpill"        data-f="review"  data-pid="${pid}">⚠️ Revisar</button>
      <button class="fpill"        data-f="done"    data-pid="${pid}">✅ Listo</button>
      <button class="fpill"        data-f="na"      data-pid="${pid}">— N/A</button>
    </div>`;
  panel.appendChild(tb);

  // Sections
  (sub.sections||[]).forEach(sec => {
    const sWrap = el('div','section');
    sWrap.innerHTML = `<div class="section-label">${sec.name}</div>`;

    const card = el('div','section-card');
    _rowIndex = 0; // reset stagger per section
    (sec.items||[]).forEach(item => {
      card.appendChild(buildRow(item, pid)); // returns wrap div (row + optional how-test-panel)
    });
    if (!sec.items?.length) {
      card.innerHTML = `<div class="empty-state">${svg('<path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 12.5a5.5 5.5 0 110-11 5.5 5.5 0 010 11z"/>',24)}<span>Sin ítems</span></div>`;
    }

    sWrap.appendChild(card);
    panel.appendChild(sWrap);
  });

  return panel;
}

function renderDiff(diff) {
  if (!diff) return '';
  return diff.split('\n').map(line => {
    const esc = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (line.startsWith('-')) return `<span class="diff-line-del">${esc}</span>`;
    if (line.startsWith('+')) return `<span class="diff-line-add">${esc}</span>`;
    return `<span class="diff-line-ctx">${esc}</span>`;
  }).join('');
}

let _rowIndex = 0; // stagger counter, reset per section in buildSubPanel
function buildRow(item, pid) {
  const status = getStatus(item.id, item.status);

  // Wrapper: both the row and (optionally) the how-test panel go inside
  const wrap = el('div');
  wrap.dataset.rowWrap = item.id;
  wrap.style.setProperty('--ri', _rowIndex++);

  const row = el('div', `todo-row ${status}`);
  row.dataset.id  = item.id;
  row.dataset.st  = status;
  row.dataset.lbl = (item.label||'').toLowerCase();
  row.dataset.pid = pid;

  const howBtn = item.how_to_test
    ? `<button class="how-test-btn" data-id="${item.id}" title="Cómo probar">${ICON_HOW} Cómo probar</button>`
    : '';

  const sugBtn = item.code_suggestion
    ? `<button class="suggest-btn" data-id="${item.id}" title="Ver sugerencia de código">${ICON_DIFF} Sugerencia</button>`
    : '';

  row.innerHTML = `
    <div class="toggle ${status}">${STATUS_ICON[status]}</div>
    <div class="row-body">
      <div class="row-label">${item.label||''}</div>
      ${item.tech_name ? `<div class="row-tech">${item.tech_name}</div>` : ''}
      ${item.notes     ? `<div class="row-note">${item.notes}</div>` : ''}
    </div>
    ${howBtn}
    ${sugBtn}
    <div class="status-badge ${status}">${STATUS_LABEL[status]}</div>`;

  row.addEventListener('click', e => {
    if (e.target.closest('.how-test-btn')) return; // handled separately
    cycleRow(row, pid);
  });
  wrap.appendChild(row);

  if (item.how_to_test || item.setup_code) {
    const panel = el('div', 'how-test-panel');
    panel.dataset.id = item.id;

    let inner = `<div class="how-test-panel-title">${ICON_PLAY} Cómo probar</div>`;

    if (item.setup_code) {
      const escapedCode = item.setup_code
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      inner += `
        <div class="setup-code-wrap" style="margin:0 0 10px 0">
          <div class="setup-code-header">
            <span>${ICON_CODE} Setup · Rails console</span>
            <button class="copy-btn" data-code="${encodeURIComponent(item.setup_code)}">${ICON_COPY} Copiar</button>
          </div>
          <div class="setup-code-body"><pre>${escapedCode}</pre></div>
        </div>`;
    }

    if (item.how_to_test) inner += item.how_to_test;

    panel.innerHTML = inner;
    wrap.appendChild(panel);

    // Copy button handler
    panel.querySelector('.copy-btn')?.addEventListener('click', e => {
      e.stopPropagation();
      const code = decodeURIComponent(e.currentTarget.dataset.code);
      navigator.clipboard?.writeText(code).then(() => {
        soundCopy();
        e.currentTarget.classList.add('copied');
        e.currentTarget.innerHTML = `${ICON_COPY} Copiado`;
        setTimeout(() => {
          e.currentTarget.classList.remove('copied');
          e.currentTarget.innerHTML = `${ICON_COPY} Copiar`;
        }, 2000);
      });
    });

    row.querySelector('.how-test-btn').addEventListener('click', e => {
      e.stopPropagation();
      const open = panel.classList.toggle('open');
      e.currentTarget.classList.toggle('open', open);
      if (open) soundPanel();
    });
  }

  if (item.code_suggestion) {
    const cs = item.code_suggestion;
    const sugPanel = el('div', 'suggest-panel');
    sugPanel.dataset.id = item.id;

    const fileRef = cs.file
      ? `${cs.file}${cs.line_start ? `:${cs.line_start}` : ''}${cs.line_end && cs.line_end !== cs.line_start ? `–${cs.line_end}` : ''}`
      : '';

    let sugInner = `
      <div class="suggest-panel-header">
        <span>${ICON_DIFF} Sugerencia de código</span>
      </div>`;

    if (cs.description) {
      sugInner += `<div class="suggest-description">${cs.description}</div>`;
    }

    if (fileRef) {
      sugInner += `<div class="suggest-file-ref">📄 ${fileRef}</div>`;
    }

    if (cs.diff) {
      sugInner += `<div class="diff-block"><pre>${renderDiff(cs.diff)}</pre></div>`;
    }

    if (cs.github_comment) {
      const escapedGh = cs.github_comment.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      sugInner += `
        <div class="suggest-actions">
          <button class="gh-copy-btn" data-code="${encodeURIComponent(cs.github_comment)}">${ICON_GH} Copiar comentario GitHub</button>
          <span class="suggest-hint">Pega directamente en la revisión del PR como suggestion block</span>
        </div>`;
    }

    sugPanel.innerHTML = sugInner;
    wrap.appendChild(sugPanel);

    if (cs.github_comment) {
      sugPanel.querySelector('.gh-copy-btn')?.addEventListener('click', e => {
        e.stopPropagation();
        const code = decodeURIComponent(e.currentTarget.dataset.code);
        navigator.clipboard?.writeText(code).then(() => {
          soundCopy();
          e.currentTarget.classList.add('copied');
          e.currentTarget.innerHTML = `${ICON_GH} Copiado`;
          setTimeout(() => {
            e.currentTarget.classList.remove('copied');
            e.currentTarget.innerHTML = `${ICON_GH} Copiar comentario GitHub`;
          }, 2000);
        });
      });
    }

    row.querySelector('.suggest-btn').addEventListener('click', e => {
      e.stopPropagation();
      const open = sugPanel.classList.toggle('open');
      e.currentTarget.classList.toggle('open', open);
      if (open) soundPanel();
    });
  }

  return wrap;
}

function cycleRow(row, pid) {
  const id   = row.dataset.id;
  const cur  = row.dataset.st;
  const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur)+1) % STATUS_CYCLE.length];
  setStatus(id, next);
  soundToggle(next);

  row.dataset.st = next;
  row.className  = `todo-row ${next} status-changed`;
  setTimeout(() => row.classList.remove('status-changed'), 350);

  const tog = row.querySelector('.toggle');
  tog.className   = `toggle ${next}`;
  tog.textContent = STATUS_ICON[next];

  const badge = row.querySelector('.status-badge');
  badge.className   = `status-badge ${next}`;
  badge.textContent = STATUS_LABEL[next];

  const lbl = row.querySelector('.row-label');
  lbl.style.textDecoration = next === 'na' ? 'line-through' : '';

  const sum = document.getElementById('summary-strip');
  if (sum) updateSummary(sum);
  refreshSubDots();
  applyFilter(pid);
}

// ── Filter/search ─────────────────────────────────────────────────────────────
function applyFilter(pid) {
  const q   = (document.querySelector(`.search-box[data-pid="${pid}"]`)?.value||'').toLowerCase();
  const act = document.querySelector(`.fpill.active[data-pid="${pid}"]`)?.dataset.f || 'all';
  document.querySelectorAll(`.todo-row[data-pid="${pid}"]`).forEach(row => {
    const mq = !q || row.dataset.lbl.includes(q);
    const mf = act==='all' || row.dataset.st===act;
    row.classList.toggle('hidden', !mq||!mf);
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const m = MATRIX_DATA;
  document.title = m.title || 'matrix-view';

  const frag = document.createDocumentFragment();
  frag.appendChild(buildHeader());
  frag.appendChild(buildSummary());
  frag.appendChild(buildLegend());

  const topNav = buildTopNav(m.tabs||[]);
  frag.appendChild(topNav);
  document.body.appendChild(frag);

  const body = el('div');

  (m.tabs||[]).forEach((tab, ti) => {
    const topPanel = el('div', 'top-panel' + (ti===0?' active':''));
    topPanel.dataset.ti = ti;
    topPanel.style.display = ti===0 ? 'block' : 'none';

    const subNav = buildSubNav(tab.subtabs||[], ti);
    topPanel.appendChild(subNav);

    const subContent = el('div','content');
    (tab.subtabs||[]).forEach((sub, si) => {
      subContent.appendChild(buildSubPanel(sub, si, ti, si===0));
    });
    topPanel.appendChild(subContent);
    body.appendChild(topPanel);
  });

  document.body.appendChild(body);

  // ── Events ─────────────────────────────────────────────────────────────────

  // Top tab switch
  topNav.addEventListener('click', e => {
    const btn = e.target.closest('.top-tab-btn');
    if (!btn) return;
    const ti = btn.dataset.ti;
    topNav.querySelectorAll('.top-tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    body.querySelectorAll('.top-panel').forEach((p,i) => {
      const on = String(i) === String(ti);
      p.classList.toggle('active', on);
      p.style.display = on ? 'block' : 'none';
    });
  });

  // Subtab switch (delegated to body)
  body.addEventListener('click', e => {
    const btn = e.target.closest('.subtab-btn');
    if (!btn) return;
    const { ti, si } = btn.dataset;
    body.querySelectorAll(`.subtab-btn[data-ti="${ti}"]`).forEach(b => b.classList.remove('active'));
    body.querySelectorAll(`.sub-panel[data-ti="${ti}"]`).forEach(p => { p.classList.remove('active'); });
    btn.classList.add('active');
    const target = body.querySelector(`.sub-panel[data-ti="${ti}"][data-si="${si}"]`);
    if (target) target.classList.add('active');
  });

  // Search
  body.addEventListener('input', e => {
    if (!e.target.classList.contains('search-box')) return;
    applyFilter(e.target.dataset.pid);
  });

  // Filter pills
  body.addEventListener('click', e => {
    const pill = e.target.closest('.fpill');
    if (!pill) return;
    const pid = pill.dataset.pid;
    body.querySelectorAll(`.fpill[data-pid="${pid}"]`).forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    applyFilter(pid);
  });

  // Summary pill quick-filter
  document.getElementById('summary-strip')?.addEventListener('click', e => {
    const pill = e.target.closest('.stat-pill[data-qs]');
    if (!pill) return;
    const qs = pill.dataset.qs;
    // Apply to all visible active sub-panels
    body.querySelectorAll('.sub-panel.active').forEach(panel => {
      const pid = `${panel.dataset.ti}-${panel.dataset.si}`;
      body.querySelectorAll(`.fpill[data-pid="${pid}"]`).forEach(p => p.classList.remove('active'));
      const target = body.querySelector(`.fpill[data-f="${qs}"][data-pid="${pid}"]`);
      if (target) { target.classList.add('active'); applyFilter(pid); }
    });
  });
}

// ── Typewriter ────────────────────────────────────────────────────────────────
function typewriter(el, text, speed = 38) {
  if (!isArwes()) { el.textContent = text; return; }
  let i = 0;
  el.textContent = '';
  function tick() {
    if (i >= text.length) return;
    el.textContent += text[i++];
    beep(1200 + Math.random() * 200, 0.012, 0.025, 'sine');
    setTimeout(tick, speed + Math.random() * 18);
  }
  setTimeout(tick, 300);
}

// ── Hover sounds (event delegation) ──────────────────────────────────────────
function initHoverSounds() {
  const HOVER_SELECTORS = [
    '.todo-row', '.top-tab-btn', '.subtab-btn',
    '.how-test-btn', '.suggest-btn', '.fpill',
    '.copy-btn', '.gh-copy-btn', '.toggle', '.status-badge'
  ];
  const selector = HOVER_SELECTORS.join(',');
  let lastHovered = null;
  document.addEventListener('mouseover', e => {
    if (!isArwes()) return;
    const target = e.target.closest(selector);
    if (!target || target === lastHovered) return;
    lastHovered = target;
    if (target.classList.contains('todo-row'))       beep(900,  0.015, 0.018, 'sine');
    else if (target.classList.contains('top-tab-btn')) beep(1100, 0.012, 0.02, 'sine');
    else if (target.classList.contains('subtab-btn'))  beep(1000, 0.012, 0.018, 'sine');
    else                                               beep(1300, 0.010, 0.015, 'sine');
  });
  document.addEventListener('mouseout', e => {
    if (e.target === lastHovered) lastHovered = null;
  });
}

// ── Re-enter animation on tab switch ─────────────────────────────────────────
function reEnterRows(panel) {
  const wraps = panel.querySelectorAll('[data-row-wrap]');
  wraps.forEach((w, i) => {
    w.style.setProperty('--ri', i % 12); // cap at 12 to avoid long delays
    w.classList.remove('re-enter');
    // Force reflow to restart animation
    void w.offsetWidth;
    w.classList.add('re-enter');
    setTimeout(() => w.classList.remove('re-enter'), 600);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  // Apply saved theme before rendering (avoids flash)
  applyTheme(currentTheme());

  render();

  // Wire theme button
  document.getElementById('theme-btn')?.addEventListener('click', toggleTheme);

  // Typewriter on header title
  const titleEl = document.querySelector('.header-title-text');
  if (titleEl) typewriter(titleEl, MATRIX_DATA.title || 'matrix-view');

  // Hover sounds
  initHoverSounds();

  // Re-enter animation on tab switches
  document.addEventListener('click', e => {
    const topBtn = e.target.closest('.top-tab-btn');
    const subBtn = e.target.closest('.subtab-btn');
    if (topBtn) {
      setTimeout(() => {
        const panel = document.querySelector('.top-panel.active');
        if (panel) reEnterRows(panel);
      }, 20);
    }
    if (subBtn) {
      setTimeout(() => {
        const panel = document.querySelector('.sub-panel.active');
        if (panel) reEnterRows(panel);
      }, 20);
    }
  });
});
